        </div>
    </header>

    <div class="container">
        <h1>ACV TEENS - INVERNO'26</h1>
        <p>Ficha de Inscrição</p>
        
        <form id="formInscricao">
            <label>Nome Completo *</label>
            <input type="text" id="nome" required>

            <label>Nº WHATSAPP (com DDD) *</label>
            <input type="tel" id="whatsapp" placeholder="(00) 99999-9999" required>

            <label>Sexo *</label>
            <select id="sexo" required>
                <option value="">Selecione...</option>
                <option value="masculino">Masculino</option>
                <option value="feminino">Feminino</option>
            </select>

            <label>Idade *</label>
            <select id="idade" required>
                <option value="">Selecione...</option>
                <script>for(let i=12; i<=18; i++) document.write(`<option value="${i}">${i}</option>`);</script>
            </select>

            <label>Tribo *</label>
            <select id="tribo" required>
                <option value="agua">Água</option>
                <option value="ar">Ar</option>
                <option value="fogo">Fogo</option>
                <option value="terra">Terra</option>
                <option value="nao_tenho">Não tenho</option>
            </select>

            <label>Cidade *</label>
            <input type="text" id="cidade" required>

            <label>Data de Nascimento *</label>
            <input type="date" id="dataNasc" required>

            <label>Nº Contato de Emergência *</label>
            <input type="tel" id="emergencia" required>

            <div class="checkbox-group">
                <input type="checkbox" id="transporte" required>
                <label for="transporte">Estou ciente de que o ACV não oferece transporte.</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="pagamento" required>
                <label for="pagamento">Estou ciente da Taxa de Reserva (R$ 150) ou valor total (R$ 600).</label>
            </div>

            <button type="submit">Enviar Inscrição</button>
        </form>
        <div id="statusMensagem"></div>
    </div>
